name: CI

# One workflow, two jobs, one gate:
#
#   verify  — type-check, lint, build (build folds in publint + attw), test.
#   release — runs ONLY after verify succeeds, ONLY on push to main, and
#             publishes to npm via semantic-release (Conventional Commits).
#
# `release` depends on `verify` with `needs:`, so publishing is impossible
# unless tests + lints are green for the exact same commit. This replaces the
# old two-workflow `workflow_run` hand-off, which had to re-check the branch and
# re-install/re-build in a separate run.

on:
  push:
    branches: [main]
  pull_request:
  # Allow a manual release run from the Actions tab (e.g. to retry a failed
  # publish) without pushing an empty commit.
  workflow_dispatch:

# Least-privilege by default; the release job widens what it needs below.
permissions:
  contents: read

# Never let two releases publish at once.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build + lint + type-check + test on a single Node (24, the supported floor).
  # `bun run build` also runs publint + attw, so artifact validation happens here
  # exactly once.
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run type-check

      - name: Lint (dogfood this plugin)
        run: bun run lint

      - name: Build (tsdown -> dist, runs publint + attw)
        run: bun run build

      - name: Test
        run: bun test

  # Publish to npm — gated on `verify`, and only on a real push to main (not PRs,
  # which can't reach npm secrets anyway) or a manual dispatch. semantic-release
  # reads the commits since the last release, computes the next version (staying
  # inside 0.x — see .releaserc.json), updates package.json + CHANGELOG.md, tags
  # the release, publishes to npm (NPM_CI_TOKEN), and opens a GitHub Release.
  #
  # Publishing is token-based on purpose. npm provenance would require
  # `id-token: write` AND a Trusted Publisher configured for this package on
  # npmjs.com — without that the publish fails — so it is left as a documented
  # opt-in (see the "Releasing" section of the README).
  release:
    name: release
    needs: verify
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the version bump + CHANGELOG, push the git tag, create the GitHub Release
      issues: write # comment on issues closed by a release
      pull-requests: write # comment on PRs included in a release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # semantic-release needs full history + all tags to find the last
          # release and compute the next version.
          fetch-depth: 0
          # Keep GITHUB_TOKEN available to git so @semantic-release/git can push
          # the release commit back to main.
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # @semantic-release/npm shells out to the real `npm` CLI to publish, so a
      # Node + npm toolchain must be present even though this repo uses Bun.
      # Note: deliberately NO `registry-url` here — semantic-release writes its
      # own temporary .npmrc from NPM_TOKEN, and setting registry-url would
      # conflict with that auth.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (produce dist/ for the publish)
        run: bun run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_CI_TOKEN }}
        run: bunx semantic-release
